<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pong Game</title>

<link rel="stylesheet" href="game.css">

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#fff;
}

#gameArea{
    text-align:center;
}
</style>
</head>
<body>

<div id="gameArea">

    <div id="gameModeScreen" class="gameScreenDiv" style="display:none;">
        <button onclick="SetIsOnePlayerMode(true);">One Player</button>
        <button onclick="SetIsOnePlayerMode(false);">Two Players</button>
    </div>

    <div id="controlModeScreen" class="gameScreenDiv" style="display:none;">
        <button onclick="SetControlMode(0);">Keyboard</button>
        <button onclick="SetControlMode(1);">Mouse</button>
    </div>

    <div id="difficultyScreen" class="gameScreenDiv" style="display:none;">
        <button onclick="SetDifficulty(0);">Easy</button>
        <button onclick="SetDifficulty(1);">Medium</button>
        <button onclick="SetDifficulty(2);">Hard</button>
    </div>

    <div id="gameScreen" class="gameScreenDiv" style="display:none;">
        <div class="scoreWrapper">
            <div id="player1Score">0</div>
            <div id="player2Score">0</div>
        </div>

        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="endGameScreen" style="display:none;">
        <div id="winMessage">WIN</div>
        <button onclick="StartGameFromEndGame();">Play Again</button>
        <button onclick="ShowMainScreen();">Main Menu</button>
    </div>

</div>

<script src="compiled-6.js"></script>
<script>
ShowMainScreen();
</script>

</body>
</html>
